version: '3.8'

services:
  server:
    build: .
    container_name: woeidchat-server
    ports:
      - "8765:8765"
    volumes:
      - woeidchat_data:/app/data
      - woeidchat_keys:/app/woeidchat_keys
      - woeidchat_uploads:/app/uploads
      - ./woeidchat.db:/app/woeidchat.db
    environment:
      - PYTHONUNBUFFERED=1
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8765
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8765/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - woeidchat-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: woeidchat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - woeidchat-network

volumes:
  woeidchat_data:
    driver: local
  woeidchat_keys:
    driver: local
  woeidchat_uploads:
    driver: local

networks:
  woeidchat-network:
    driver: bridge
