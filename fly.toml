# Fly.io configuration for WoeidChat

app = "woeidchat"
primary_region = "sjc"  # San Jose, USA - change to your region

[build]
builder = "heroku"

[env]
  PORT = "8000"
  HOST = "0.0.0.0"

[[services]]
  internal_port = 8000
  processes = ["app"]

  [services.http_checks]
    enabled = true
    grace_period = "30s"
    interval = "15s"
    min_recovery_margin = "5s"
    path = "/health"
    protocol = "http"
    timeout = "5s"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[[statics]]
  guest_path = "/static"
  url_prefix = "/static"
