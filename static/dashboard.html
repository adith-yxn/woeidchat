<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoeidChat - Global Messaging</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            color: #333;
        }

        .container {
            display: flex;
            height: 100vh;
            background: #fff;
        }

        /* Sidebar */
        .sidebar {
            width: 360px;
            background: #fff;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .sidebar-title {
            font-size: 32px;
            font-weight: 700;
            color: #075e54;
        }

        .sidebar-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #e5e5e5;
        }

        /* Search Bar */
        .search-container {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box:focus {
            border-color: #075e54;
            background: #f5f5f5;
        }

        .search-box::placeholder {
            color: #999;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            padding: 0 16px;
            border-bottom: 1px solid #f0f0f0;
            gap: 24px;
        }

        .tab-btn {
            padding: 12px 0;
            border: none;
            background: none;
            cursor: pointer;
            color: #65676b;
            font-weight: 500;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: #075e54;
            border-bottom-color: #075e54;
        }

        .tab-btn:hover {
            color: #075e54;
        }

        /* Chats List */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 8px;
        }

        .chat-item {
            display: flex;
            padding: 8px 8px;
            margin-bottom: 2px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .chat-item:hover {
            background: #f5f5f5;
        }

        .chat-item.active {
            background: #f0f0f0;
        }

        .chat-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
            position: relative;
            flex-shrink: 0;
            margin-right: 12px;
        }

        .online-indicator {
            width: 14px;
            height: 14px;
            background: #31a24c;
            border: 3px solid white;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .chat-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 500;
            color: #000;
            font-size: 15px;
        }

        .chat-time {
            font-size: 13px;
            color: #65676b;
            margin-left: auto;
        }

        .chat-preview {
            font-size: 13px;
            color: #65676b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: #075e54;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .chat-header-bar {
            padding: 12px 20px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }

        .chat-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-info-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #25d366 0%, #075e54 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            position: relative;
        }

        .chat-details {
            display: flex;
            flex-direction: column;
        }

        .chat-title {
            font-weight: 500;
            color: #000;
            font-size: 15px;
        }

        .chat-status {
            font-size: 12px;
            color: #65676b;
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .header-icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #075e54;
            transition: transform 0.2s;
        }

        .header-icon-btn:hover {
            transform: scale(1.2);
        }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #fff;
        }

        .message-group {
            display: flex;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-group.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 55%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }

        .message-bubble.other {
            background: #e5e5ea;
            color: #000;
            border-bottom-left-radius: 4px;
        }

        .message-bubble.own {
            background: #dcf8c6;
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }

        .message-group.own .message-time {
            text-align: right;
        }

        .read-receipt {
            margin-left: 4px;
            font-size: 12px;
            color: #075e54;
        }

        /* Input Area */
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #fff;
        }

        .input-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #075e54;
            transition: transform 0.2s;
            padding: 8px;
        }

        .icon-btn:hover {
            transform: scale(1.1);
        }

        .message-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 100px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: #075e54;
            background: #f9f9f9;
        }

        .message-input::placeholder {
            color: #999;
        }

        /* User Discovery */
        .discovery-container {
            display: none;
        }

        .discovery-container.active {
            display: flex;
            flex-direction: column;
        }

        .discovery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 16px;
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }

        .user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .user-card:hover {
            background: #efefef;
            transform: translateY(-4px);
        }

        .user-avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #075e54 0%, #128c7e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 32px;
        }

        .user-name-discovery {
            font-weight: 600;
            color: #000;
            font-size: 14px;
            word-break: break-word;
        }

        .user-username {
            font-size: 12px;
            color: #65676b;
        }

        .add-btn {
            padding: 6px 12px;
            background: #075e54;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background: #054d44;
        }

        .add-btn.added {
            background: #999;
            cursor: default;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 5px 40px rgba(0, 0, 0, 0.16);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #000;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-input {
            padding: 12px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-input:focus {
            border-color: #075e54;
            background: #f9f9f9;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn.primary {
            background: #075e54;
            color: white;
        }

        .modal-btn.primary:hover {
            background: #054d44;
        }

        .modal-btn.secondary {
            background: #f0f0f0;
            color: #000;
        }

        .modal-btn.secondary:hover {
            background: #e5e5e5;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            gap: 16px;
        }

        .empty-icon {
            font-size: 64px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: 16px;
            text-align: center;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 50vh;
                border-right: none;
                border-bottom: 1px solid #e5e5e5;
            }

            .chat-area {
                height: 50vh;
            }

            .message-bubble {
                max-width: 85%;
            }

            .discovery-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            height: 20px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
            }
            30% {
                opacity: 1;
            }
        }

        /* Premium Badge */
        .premium-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #ffc107;
            color: #000;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">WoeidChat</div>
                <div class="sidebar-actions">
                    <button class="action-btn" onclick="openSettings()">⚙️</button>
                    <button class="action-btn" onclick="logout()">🚪</button>
                </div>
            </div>

            <div class="search-container">
                <input 
                    type="text" 
                    class="search-box" 
                    id="searchInput" 
                    placeholder="Search username..." 
                    onkeyup="searchUsers(event)"
                >
            </div>

            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('chats')">Messages</button>
                <button class="tab-btn" onclick="switchTab('discover')">Discover</button>
                <button class="tab-btn" onclick="switchTab('contacts')">Contacts</button>
            </div>

            <div id="chatsTab" class="chats-list" style="display: block;">
                <!-- Chat items will be populated here -->
            </div>

            <div id="discoverTab" class="discovery-container">
                <div class="discovery-grid" id="discoveryGrid">
                    <!-- User cards will be populated here -->
                </div>
            </div>

            <div id="contactsTab" style="display: none; flex: 1; overflow-y: auto; padding: 8px;">
                <!-- Contacts will be populated here -->
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                <div class="empty-icon">💬</div>
                <div class="empty-text">Select a chat or discover users to get started!</div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">Settings</div>
            <div class="modal-body">
                <label>Status</label>
                <input type="text" class="modal-input" id="statusInput" placeholder="Your status...">
                <label>Theme</label>
                <select class="modal-input" id="themeSelect">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
                <label style="margin-top: 12px; display: flex; align-items: center;">
                    <input type="checkbox" id="notificationsToggle" checked style="margin-right: 8px;">
                    Enable notifications
                </label>
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" onclick="closeSettings()">Cancel</button>
                <button class="modal-btn primary" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <!-- New Chat Modal -->
    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <div class="modal-header">Start a chat</div>
            <div class="modal-body">
                <input type="text" class="modal-input" id="newChatUsername" placeholder="Search username...">
                <div id="searchResults" style="display: none; margin-top: 12px;">
                    <!-- Search results will appear here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // App State
        const app = {
            token: localStorage.getItem('token') || '',
            currentUser: JSON.parse(localStorage.getItem('currentUser') || '{}'),
            currentChat: null,
            chats: [],
            messages: {},
            users: [],
            contacts: [],
            ws: null
        };

        // Initialize
        function init() {
            if (!app.token) {
                window.location.href = '/static/login.html';
                return;
            }

            loadChats();
            loadUsers();
            setupWebSocket();

            // Simulate data
            simulateChats();
        }

        // Simulate chats
        function simulateChats() {
            app.chats = [
                {
                    id: 'alice',
                    name: 'Alice Johnson',
                    avatar: '👩',
                    preview: 'Hey! How are you doing?',
                    timestamp: '2 min',
                    unread: 2,
                    online: true
                },
                {
                    id: 'tech_team',
                    name: 'Tech Team',
                    avatar: '👥',
                    preview: 'Meeting at 3 PM today',
                    timestamp: '15 min',
                    unread: 0,
                    online: true
                },
                {
                    id: 'bob',
                    name: 'Bob Smith',
                    avatar: '👨',
                    preview: 'Thanks for the help!',
                    timestamp: '1 hour',
                    unread: 0,
                    online: false
                },
                {
                    id: 'sarah',
                    name: 'Sarah Williams',
                    avatar: '👩‍🦰',
                    preview: 'See you tomorrow 😊',
                    timestamp: 'yesterday',
                    unread: 0,
                    online: true
                },
                {
                    id: 'dev_group',
                    name: 'Developers Chat',
                    avatar: '👨‍💻',
                    preview: 'Code review done!',
                    timestamp: '3 days',
                    unread: 0,
                    online: true
                }
            ];

            app.messages = {
                'alice': [
                    { id: 1, text: 'Hey! How are you doing?', from: 'alice', time: '2:30 PM', read: true },
                    { id: 2, text: 'I am good! You?', from: 'me', time: '2:31 PM', read: true },
                    { id: 3, text: 'Great! Want to grab coffee?', from: 'alice', time: '2:32 PM', read: true }
                ],
                'bob': [
                    { id: 1, text: 'Can you review my code?', from: 'bob', time: '1:15 PM', read: true },
                    { id: 2, text: 'Sure! Send me the link', from: 'me', time: '1:16 PM', read: true },
                    { id: 3, text: 'Thanks for the help!', from: 'bob', time: '1:45 PM', read: true }
                ]
            };

            renderChats();
        }

        // Render chats
        function renderChats() {
            const chatsList = document.getElementById('chatsTab');
            chatsList.innerHTML = app.chats.map(chat => `
                <div class="chat-item ${app.currentChat?.id === chat.id ? 'active' : ''}" onclick="selectChat('${chat.id}')">
                    <div class="chat-avatar">
                        ${chat.avatar}
                        ${chat.online ? '<div class="online-indicator"></div>' : ''}
                    </div>
                    <div class="chat-content">
                        <div class="chat-header">
                            <div class="chat-name">${chat.name}</div>
                            <div class="chat-time">${chat.timestamp}</div>
                        </div>
                        <div class="chat-preview" style="display: flex; align-items: center;">
                            ${chat.preview}
                            ${chat.unread > 0 ? `<div class="unread-badge">${chat.unread}</div>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Select chat
        function selectChat(chatId) {
            app.currentChat = app.chats.find(c => c.id === chatId);
            renderChatArea();
            renderChats();
        }

        // Render chat area
        function renderChatArea() {
            if (!app.currentChat) return;

            const messages = app.messages[app.currentChat.id] || [];
            const chatArea = document.getElementById('chatArea');

            chatArea.innerHTML = `
                <div class="chat-header-bar">
                    <div class="chat-info">
                        <div class="chat-info-avatar">${app.currentChat.avatar}</div>
                        <div class="chat-details">
                            <div class="chat-title">${app.currentChat.name}</div>
                            <div class="chat-status">${app.currentChat.online ? 'Online' : 'Offline'}</div>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="header-icon-btn" onclick="initiateCall('voice')">☎️</button>
                        <button class="header-icon-btn" onclick="initiateCall('video')">📹</button>
                        <button class="header-icon-btn" onclick="alert('Search in chat (coming soon)')">🔍</button>
                    </div>
                </div>

                <div class="messages-container">
                    ${messages.map(msg => `
                        <div class="message-group ${msg.from === 'me' ? 'own' : ''}">
                            <div>
                                <div class="message-bubble ${msg.from === 'me' ? 'own' : 'other'}">
                                    ${msg.text}
                                </div>
                                <div class="message-time">
                                    ${msg.time}
                                    ${msg.from === 'me' && msg.read ? '<span class="read-receipt">✓✓</span>' : ''}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="input-area">
                    <div class="input-actions">
                        <button class="icon-btn" onclick="attachFile()">📎</button>
                        <button class="icon-btn" onclick="insertEmoji()">😊</button>
                    </div>
                    <input 
                        type="text" 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="Type a message..."
                        onkeypress="handleMessageKeypress(event)"
                    >
                    <button class="icon-btn" onclick="sendMessage()">📤</button>
                </div>
            `;

            const msgInput = document.getElementById('messageInput');
            if (msgInput) msgInput.focus();
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // Add message to UI
            if (!app.messages[app.currentChat.id]) {
                app.messages[app.currentChat.id] = [];
            }

            app.messages[app.currentChat.id].push({
                id: Date.now(),
                text: text,
                from: 'me',
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                read: false
            });

            input.value = '';
            renderChatArea();
        }

        // Handle keypress
        function handleMessageKeypress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('[id$="Tab"]').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            if (tab === 'discover') {
                document.getElementById('discoverTab').classList.add('active');
                document.getElementById('discoverTab').style.display = 'flex';
                loadDiscoveredUsers();
            } else if (tab === 'contacts') {
                document.getElementById('contactsTab').style.display = 'block';
                loadContacts();
            } else {
                document.getElementById('chatsTab').style.display = 'block';
            }
            
            event.target.classList.add('active');
        }

        // Load discovered users
        function loadDiscoveredUsers() {
            const users = [
                { id: 'user1', name: 'Emma Brown', username: '@emmabrown', avatar: '👩‍🦱' },
                { id: 'user2', name: 'John Developer', username: '@johndev', avatar: '👨‍💻' },
                { id: 'user3', name: 'Lisa Chen', username: '@lisachen', avatar: '👩‍🔬' },
                { id: 'user4', name: 'Mike Johnson', username: '@mikej', avatar: '👨' },
                { id: 'user5', name: 'Sara Tech', username: '@saratech', avatar: '👩‍🚀' },
                { id: 'user6', name: 'Alex Kumar', username: '@alexkumar', avatar: '🧑' }
            ];

            const grid = document.getElementById('discoveryGrid');
            grid.innerHTML = users.map(user => `
                <div class="user-card" onclick="addContact('${user.id}')">

            `).join('');
        }

        // Add contact
        function addContact(userId, event) {
            if (event) event.stopPropagation();
            const btn = event?.target;
            if (btn) {
                btn.textContent = '✓ Added';
                btn.classList.add('added');
                btn.disabled = true;
            }
        }

        // Load contacts
        function loadContacts() {
            const contacts = [
                { id: 'alice', name: 'Alice Johnson', username: '@alice', online: true },
                { id: 'bob', name: 'Bob Smith', username: '@bob', online: false },
                { id: 'sarah', name: 'Sarah Williams', username: '@sarah', online: true },
                { id: 'john', name: 'John Doe', username: '@johndoe', online: true }
            ];

            const contactsTab = document.getElementById('contactsTab');
            contactsTab.innerHTML = contacts.map(contact => `
                <div class="chat-item" onclick="selectChat('${contact.id}')">
                    <div class="chat-avatar">
                        ${String.fromCharCode(0x1F300 + Math.random() * 70)}
                        ${contact.online ? '<div class="online-indicator"></div>' : ''}
                    </div>
                    <div class="chat-content">
                        <div class="chat-header">
                            <div class="chat-name">${contact.name}</div>
                        </div>
                        <div class="chat-preview">${contact.username}</div>
                    </div>
                </div>
            `).join('');
        }

        // Search users
        function searchUsers(event) {
            const query = event.target.value.toLowerCase();
            if (query.length < 2) {
                renderChats();
                return;
            }

            const filtered = app.chats.filter(chat => 
                chat.name.toLowerCase().includes(query) || 
                chat.id.toLowerCase().includes(query)
            );

            const chatsList = document.getElementById('chatsTab');
            chatsList.innerHTML = filtered.map(chat => `
                <div class="chat-item" onclick="selectChat('${chat.id}')">
                    <div class="chat-avatar">${chat.avatar}</div>
                    <div class="chat-content">
                        <div class="chat-header">
                            <div class="chat-name">${chat.name}</div>
                        </div>
                        <div class="chat-preview">${chat.preview}</div>
                    </div>
                </div>
            `).join('');
        }

        // Settings
        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function saveSettings() {
            const status = document.getElementById('statusInput').value;
            const theme = document.getElementById('themeSelect').value;
            const notifications = document.getElementById('notificationsToggle').checked;

            localStorage.setItem('userStatus', status);
            localStorage.setItem('theme', theme);
            localStorage.setItem('notifications', notifications);

            closeSettings();
            alert('Settings saved!');
        }

        function setupWebSocket() {
            try {
                // Get WebSocket URL dynamically
                const host = window.location.hostname;
                const port = window.location.port;
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                let wsUrl;
                
                if (host === 'localhost' || host === '127.0.0.1') {
                    wsUrl = `${protocol}//localhost:8000/ws/realtime/${app.token}`;
                } else {
                    wsUrl = `${protocol}//${host}/ws/realtime/${app.token}`;
                }
                
                app.ws = new WebSocket(wsUrl);
                app.ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    console.log('WebSocket message:', data);
                };
            } catch (e) {
                console.error('WebSocket error:', e);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/static/login.html';
        }

        // Start app
        init();
    </script>
